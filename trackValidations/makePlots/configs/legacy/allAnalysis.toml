# Basic configuration for setting up the 

[global]
project = "twoDValidations"
project_name = "ICARUS BNB MC" # toadd
file = "/exp/icarus/app/users/msotgia/analysis/twoDRecoStudies/trackValidations/writerTwoDValidationsRedoCorrectBestmatch.root"
outdir = "/exp/icarus/app/users/msotgia/analysis/twoDRecoStudies/trackValidations/makePlots/configurationSingles1D/"
fontsize = 17
labelfontsize = 28

# --------------------------------------------------------------------
# =====================================================================
# --------------------------------------------------------------------

[analyses.Muons]
merge_on = "Evt"
# density = true
# figsize = [5.0, 3.5]
analysis_supplementaltext = "icaruscode_v10_06_00_07_develop"

# --------------------------------------------------------------------

[analyses.Protons]
merge_on = "Evt"
# density = true
# figsize = [5.0, 3.5]
analysis_supplementaltext = "icaruscode_v10_06_00_07_develop"

# --------------------------------------------------------------------

[analyses.Pions]
merge_on = "Evt"
# density = true
# figsize = [5.0, 3.5]
analysis_supplementaltext = "icaruscode_v10_06_00_07_develop"

# --------------------------------------------------------------------
# =====================================================================
# --------------------------------------------------------------------

[[analyses.Muons.datasets]]
name = "Muons/DconfigD/configD"
# No `style` entr --> default to black line 2 pt
label = "2D + DNNROI\nw/ Pulse Trains = 10"
style = "style_dnnpt"

[[analyses.Muons.datasets]]
name = "Muons/DconfigC/configC"
# No `style` entr --> default to black line 2 pt
label = "2D + DNNROI\nw/o Pulse Trains"
style = "style_dnn"

[[analyses.Muons.datasets]]
name = "Muons/DconfigB/configB"
style = "style_2d"
label = "2D signal proc."

[[analyses.Muons.datasets]]
name = "Muons/DconfigA/configA"
# No `style` entr --> default to black line 2 pt
label = "1D signal proc."

# --------------------------------------------------------------------

[[analyses.Protons.datasets]]
