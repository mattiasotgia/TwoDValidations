# Possible choices 
# ['fill', 'step', 'errorbar', 'band', 'bar', 'barstep']

# this overwrites the default style if needed
[style_nominal]
histtype = "step"
yerr = false
color = "k"
linewidth = 1

[style_spine]
histtype = "errorbar"
yerr = true
color = "gray"
# alpha = 0.5
# linestyle = ":"
linewidth = 3

[style_1uNp]
histtype = "step"
color = "tab:orange"
yerr = false
linestyle = "--"
linewidth = 5

[style_1eNpMpi0]
histtype = "step"
color = "tab:blue"
yerr = false
linewidth = 7

[style_1eNp0pi0]
histtype = "step"
color = "tab:green"
yerr = false
linewidth = 9
